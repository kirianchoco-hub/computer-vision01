<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Game Khủng Long</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="game-container">
        <div id="clouds"></div>
        <div id="ground"></div>
        <div id="score">Điểm: 0</div>
        <div id="dino"></div>
        
        <div id="cactus" class="cactus-move tree1"></div>

        <div id="game-over-screen" style="display: none;">
            <h2>GAME OVER</h2>
            <p id="final-score">Điểm của bạn: 0</p>
            
            <div class="rating-box">
                <label for="rating-select">Bạn đánh giá trò chơi mấy điểm?</label>
                <select id="rating-select">
                    <option value="10">10 - Tuyệt vời cực kỳ!</option>
                    <option value="9">9 - Rất hay</option>
                    <option value="8">8 - Hay</option>
                    <option value="7">7 - Chơi ổn</option>
                    <option value="6">6 - Bình thường</option>
                    <option value="5">5 - Trung bình</option>
                    <option value="4">4 - Hơi tệ</option>
                    <option value="3">3 - Tệ</option>
                </select>
            </div>

            <div class="button-group">
                <button onclick="submitFeedbackSilently()" class="btn-submit">Gửi đánh giá</button>
                <button onclick="restartGame()" class="btn-restart">Chơi lại</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
